steps:
  # 1 - Build the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pado-produtos:$COMMIT_SHA'
      - '.'

  # 2 - Push to artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pado-produtos:$COMMIT_SHA'

  # 3 - Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pado-produtos'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pado-produtos:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pado-produtos:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
